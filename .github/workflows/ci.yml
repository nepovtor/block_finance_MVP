name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend_block-finance_mvp

    env:
      DATABASE_URL: sqlite+aiosqlite:///./.test-data/ci.db
      ENVIRONMENT: test
      SECRET_KEY: ci-secret-key
      JWT_SECRET: ci-jwt-secret
      CONSENT_HASH_SECRET: ci-consent-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend_block-finance_mvp/requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt

      - name: Run database migrations
        run: |
          mkdir -p .test-data
          alembic upgrade head

      - name: Run backend tests
        run: pytest -q

  frontend:
    name: Frontend typecheck and build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend_block_finance_mvp

    env:
      VITE_API_BASE_URL: https://blockfinancemvp-production.up.railway.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend_block_finance_mvp/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
